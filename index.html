<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Prozent Rechner</title>

<!-- PWA Manifest -->
<link rel="manifest" href="manifest.json">

<!-- iOS Fullscreen & Statusbar -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RB Rechner">

<!-- iOS Icon -->
<link rel="apple-touch-icon" href="icon-180.png">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px;}
.container{background:white;border-radius:22px;padding:28px;box-shadow:0 20px 60px rgba(0,0,0,0.25);max-width:420px;width:100%;}
h1{color:#667eea;text-align:center;margin-bottom:22px;font-size:24px;}
.input-group{margin-bottom:25px;}
label{display:block;margin-bottom:10px;color:#555;font-size:16px;}
input{width:100%;padding:18px;font-size:22px;border-radius:12px;border:2px solid #e0e0e0;-webkit-appearance:none;}
input:focus{outline:none;border-color:#667eea;}
.result-group{background:#f6f6f6;padding:16px;border-radius:12px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;}
.result-label{color:#666;font-size:17px;}
.result-value{font-size:24px;color:#667eea;font-weight:bold;}
.highlight{border:3px solid black;background:#ffffff;padding:20px;margin-bottom:18px;}
.big{font-size:30px;}
@media (min-width:700px){.container{max-width:520px;padding:36px;}input{font-size:26px;padding:20px;}.result-value{font-size:28px;}.big{font-size:36px;}}
</style>
</head>
<body>

<div class="container">

<h1>Prozent Rechner</h1>

<div class="input-group">
<label>Betrag eingeben</label>
<input type="text" inputmode="decimal" id="eingabe" placeholder="0" autofocus>
</div>

<div class="result-group highlight">
<div class="result-label">÷12 × 11</div>
<div class="result-value big" id="r1">0,00</div>
</div>

<div class="result-group">
<div class="result-label">-10%</div>
<div class="result-value" id="r2">0,00</div>
</div>

<div class="result-group">
<div class="result-label">-20%</div>
<div class="result-value" id="r3">0,00</div>
</div>

<div class="result-group">
<div class="result-label">+20%</div>
<div class="result-value" id="r4">0,00</div>
</div>

</div>

<script>
const eingabeField = document.getElementById("eingabe");
const r1 = document.getElementById("r1");
const r2 = document.getElementById("r2");
const r3 = document.getElementById("r3");
const r4 = document.getElementById("r4");

function format(num){return num.toFixed(2).replace(".",",");}

function berechnen(){
let value = eingabeField.value.replace(",",".");
let x = parseFloat(value)||0;
r1.textContent = format((x/12)*11);
r2.textContent = format(x*0.9);
r3.textContent = format(x*0.8);
r4.textContent = format(x*1.2);
}

eingabeField.addEventListener("input",berechnen);
</script>

</body>
</html>
