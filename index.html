<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minus 10 Prozent</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 100%;
        }

        h1 {
            color: #667eea;
            text-align: center;
            margin-bottom: 30px;
            font-size: 24px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #555;
            margin-bottom: 8px;
            font-weight: 500;
        }

        input[type="number"] {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            transition: border-color 0.3s;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .result-group {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }

        .result-label {
            color: #666;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .result-value {
            font-size: 32px;
            color: #667eea;
            font-weight: bold;
        }

        .formula {
            text-align: center;
            color: #999;
            font-size: 14px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Minus 10 Prozent</h1>
        
        <div class="input-group">
            <label for="eingabe">Betrag eingeben:</label>
            <input type="number" id="eingabe" placeholder="0" step="0.01" autofocus>
        </div>

        <div class="result-group">
            <div class="result-label">Ergebnis:</div>
            <div class="result-value" id="ergebnis">0,00</div>
        </div>

        <div class="formula">Formel: Eingabe ÷ 12 × 11</div>
    </div>

    <script>
        const eingabeField = document.getElementById('eingabe');
        const ergebnisField = document.getElementById('ergebnis');

        function berechnen() {
            const eingabe = parseFloat(eingabeField.value) || 0;
            const ergebnis = (eingabe / 12) * 11;
            const gerundet = ergebnis.toFixed(2);
            
            // Deutsche Formatierung mit Komma
            ergebnisField.textContent = gerundet.replace('.', ',');
        }

        // Berechnung bei Eingabe
        eingabeField.addEventListener('input', berechnen);
        
        // Berechnung bei Enter
        eingabeField.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                berechnen();
                eingabeField.blur(); // Optional: Tastatur ausblenden
            }
        });
    </script>
</body>
</html>
